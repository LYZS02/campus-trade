server.port=8080

# Default profile uses H2 (in-memory database, no MySQL install needed)
spring.datasource.url=jdbc:h2:mem:campus_trade
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# To switch to MySQL, create a file named application-mysql.properties
# and run with --spring.profiles.active=mysql
# spring.datasource.url=jdbc:mysql://localhost:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
